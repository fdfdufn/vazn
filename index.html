<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vazn</title>

<style>
    /* Reset */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        background: #0a0a0a;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* Container */
    .container {
        text-align: center;
        animation: fadeIn 1.5s ease forwards;
        opacity: 0;
    }

    /* Title */
    h1 {
        font-size: 2.5rem;
        letter-spacing: 2px;
        margin-bottom: 25px;
        animation: slideDown 1s ease forwards;
    }

    /* Profile */
    .profile {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-bottom: 20px;
        animation: fadeIn 2s ease forwards;
    }

    .profile img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid #fff;
        object-fit: cover;
        transition: transform 0.3s ease;
    }

    .profile img:hover {
        transform: scale(1.1) rotate(3deg);
    }

    .username {
        font-size: 1.2rem;
        opacity: 0.8;
    }

    /* About */
    .about {
        margin: 15px 0;
        font-size: 1rem;
        opacity: 0.7;
    }

    /* Status */
    .status {
        margin: 10px 0 25px;
        font-size: 1rem;
    }

    .inactive {
        color: #ff3b3b;
        font-weight: bold;
    }

    /* Links */
    .links {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .links a {
        text-decoration: none;
        color: #fff;
        padding: 12px;
        border: 1px solid #444;
        border-radius: 8px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    /* Button hover effect */
    .links a::before {
        content: "";
        position: absolute;
        width: 0%;
        height: 100%;
        top: 0;
        left: 0;
        background: linear-gradient(120deg, #6a00ff, #00d4ff);
        transition: width 0.4s ease;
        z-index: -1;
    }

    .links a:hover::before {
        width: 100%;
    }

    .links a:hover {
        color: #000;
        transform: translateY(-3px);
        box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }

    /* Animations */
    @keyframes fadeIn {
        to { opacity: 1; }
    }

    @keyframes slideDown {
        from {
            transform: translateY(-30px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    /* Startup animation overlay */
    .intro {
        position: fixed;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 999;
        animation: introFade 2s ease forwards;
    }

    .intro span {
        font-size: 2rem;
        letter-spacing: 5px;
        animation: glow 1.5s infinite alternate;
    }

    @keyframes introFade {
        0% { opacity: 1; }
        80% { opacity: 1; }
        100% { opacity: 0; visibility: hidden; }
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #fff; }
        to { text-shadow: 0 0 20px #6a00ff, 0 0 30px #00d4ff; }
    }

    /* Mobile */
    @media (max-width: 600px) {
        h1 {
            font-size: 2rem;
        }

        .profile img {
            width: 65px;
            height: 65px;
        }
    }
</style>
</head>

<body>

<div class="intro">
    <span>LOADING</span>
</div>

<div class="container">
    <h1>vazN</h1>

    <div class="profile">
        <img src="https://via.placeholder.com/150" alt="profile">
        <div class="username">vee</div>
    </div>

    <div class="about">
        Designer, advanced cybersecurity
    </div>

    <div class="status">
        Status: <span class="inactive">inactive</span>
    </div>

    <div class="links">
        <a href="#">telegram</a>
        <a href="#">signal</a>
    </div>
</div>

</body>
</html>
